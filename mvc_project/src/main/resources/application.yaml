server:
  port: 8080

spring:
  application:
    name: mvc_project

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/mvc_project
    username: testuser
    password: test1234
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.example.mvc_project
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.mvc_project: TRACE
    org.mybatis: DEBUG

# 파일 업로드 경로
file:
  upload-dir: ./upload/board