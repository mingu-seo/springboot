<div th:replace="~{layout/default :: layout(
        ${'MVC 프로젝트'},
        ~{::content}
      )}">
  <th:block th:fragment="content">
  <div class="sub">
    <div class="size">
      <h3 class="sub_title">답변게시판</h3>
      <div class="bbs">
        <table class="list">
          <p>
              <span>
                  <strong>총 <span th:text="${pageResponse.totalCount}">0</span>개</strong>
                  | <span th:text="${pageRequest.page}">1</span>/<span th:text="${pageResponse.totalPage}">1</span>페이지
              </span>
          </p>
          <caption>게시판 목록</caption>
          <colgroup>
            <col width="80px" />
            <col width="*" />
            <col width="100px" />
            <col width="100px" />
            <col width="100px" />
          </colgroup>
          <thead>
          <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>조회수</th>
            <th>작성일</th>
          </tr>
          </thead>
          <tbody>
          <!-- 글이 없는 경우 -->
          <tr th:if="${#lists.isEmpty(pageResponse.list)}">
            <td class="first" colspan="5">등록된 글이 없습니다.</td>
          </tr>
          <!-- 글 목록 -->
          <tr th:each="board : ${pageResponse.list}">
            <td th:text="${board.no}"></td>
            <td style="text-align:left;">
              <!-- 답글 들여쓰기 -->
              <span th:each="i : ${#numbers.sequence(1, board.nested)}" th:if="${board.nested > 0}">
                                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                                  </span>
              <img th:if="${board.nested > 0}" th:src="@{/images/ico_re.png}">
              <a th:href="@{/board/view/{no}(no=${board.no})}">
                <span th:text="${board.title}"></span>
                <span th:if="${board.commentCount > 0}"
                      th:text="'[' + ${board.commentCount} + ']'"></span>
              </a>
            </td>
            <td class="writer" th:text="${board.writerName}"></td>
            <td th:text="${board.readcnt}"></td>
            <td class="date" th:text="${#temporals.format(board.regdate, 'yyyy-MM-dd')}"></td>
          </tr>
          </tbody>
        </table>

        <!-- 글작성 버튼 -->
        <div class="btnSet" style="text-align:right;">
            <a th:if="${session.loginMember != null}" class="btn" th:href="@{/board/write}">글작성</a>
        </div>

        <!-- 페이징 -->
        <th:block th:replace="~{fragments/pagination :: pagination(${pageResponse}, ${pageRequest}, '/board/list')}"></th:block>

        <!-- 검색 -->
        <div class="bbsSearch">
          <form method="get" id="searchForm" th:action="@{/board/list}">
              <span class="srchSelect">
                  <select name="searchType" class="dSelect" title="검색분류 선택">
                      <option value="all" th:selected="${pageRequest.searchType == 'all'}">전체</option>
                      <option value="title" th:selected="${pageRequest.searchType == 'title'}">제목</option>
                      <option value="content" th:selected="${pageRequest.searchType == 'content'}">내용</option>
                  </select>
              </span>
              <span class="searchWord">
                  <input type="text" name="searchWord" th:value="${pageRequest.searchWord}" title="검색어 입력">
                  <input type="submit" value="검색" title="검색">
              </span>
          </form>
        </div>
      </div>
    </div>
  </div>
  </th:block>
</div>
