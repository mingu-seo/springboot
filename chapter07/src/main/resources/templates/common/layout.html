<!DOCTYPE html>
<html lang="en" th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Title</title>
</head>
<body>
  <div th:replace="~{common/header :: header}"></div>

  <!-- 페이지별 본문(여기에 각 페이지 content fragment가 들어옴) -->
  <main th:replace="${content}"></main>

  <footer th:replace="~{common/footer :: footer}"></footer>
</body>
</html>
