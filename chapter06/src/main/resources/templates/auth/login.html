<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
</head>
<body>
<h2>로그인</h2>

<div th:if="${error != null}" th:text="${error}" style="color:red;"></div>

<form method="post" action="/auth/login">
  <div>
    <label>아이디</label>
    <input type="text" name="username" th:value="${rememberId}" />
  </div>

  <div>
    <label>비밀번호</label>
    <input type="password" name="password" />
  </div>

  <div>
    <label>
      <input type="checkbox" name="remember" />
      아이디 기억하기
    </label>
  </div>

  <button type="submit">로그인</button>
</form>
</body>
</html>
