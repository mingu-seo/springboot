spring:
  application:
    name: emotiondiary
  profiles:
    active: local
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update # 운영에서는 update로 하면 안됨
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  member:
    secret: ${JWT_MEMBER_SECRET}
    access-exp-min: 30
    refresh-exp-min: 1440